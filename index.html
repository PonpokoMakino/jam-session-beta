<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>セッション運営アプリ（プロトタイプ）</title>
<style>
  :root{
    --bg:#f6f7f9; --card:#ffffff; --ink:#15181d; --ink2:#5b626d; --ink3:#8a909a;
    --line:#e5e7eb; --line2:#d3d7dd;
    --accent:#e8590c; --accent2:#2563eb;      /* 音楽=アンバー系でsaas-labと差別化 */
    --ok-bg:#d8f3ec; --ok-fg:#0a5c4c;
    --info-bg:#dbeafe; --info-fg:#1e40af;
    --lo-bg:#eef0f3; --lo-fg:#4b5563;
    --hot-bg:#ffe6d6; --hot-fg:#9a3d0a;
    --warn-bg:#fdeecf; --warn-fg:#92560a;
    --soft:#f0f2f5;
    --radius:14px; --radius-s:8px;
  }
  @media (prefers-color-scheme: dark){
    :root{
      --bg:#16181c; --card:#1e2127; --ink:#e9ebef; --ink2:#a3aab4; --ink3:#7b828d;
      --line:#2b2f36; --line2:#3a3f47;
      --accent:#fb923c; --accent2:#5b9bf0;
      --ok-bg:#0e3d33; --ok-fg:#8fe3d0;
      --info-bg:#13315f; --info-fg:#a8c9f5;
      --lo-bg:#2b3038; --lo-fg:#c3c9d2;
      --hot-bg:#4a2a12; --hot-fg:#f6b487;
      --warn-bg:#43320f; --warn-fg:#f0c781;
      --soft:#23272e;
    }
  }
  *{box-sizing:border-box}
  body{margin:0; background:var(--bg); color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Hiragino Kaku Gothic ProN","Noto Sans JP",Meiryo,sans-serif;
    line-height:1.6; -webkit-font-smoothing:antialiased;}
  .wrap{max-width:900px; margin:0 auto; padding:20px 16px 72px;}
  .topbar{display:flex; align-items:center; gap:10px; flex-wrap:wrap; margin-bottom:14px;}
  h1{font-size:21px; font-weight:800; margin:0; display:flex; align-items:center; gap:8px;}
  .role-pill{font-size:11px; padding:3px 10px; border-radius:99px; font-weight:700;
    background:var(--hot-bg); color:var(--hot-fg);}
  .spacer{flex:1;}
  .sub{font-size:12.5px; color:var(--ink2); margin:2px 0 16px;}
  select,input,button,textarea{font-family:inherit; font-size:13px; color:var(--ink);}
  select,input[type=text],input[type=time],textarea{background:var(--card); border:1px solid var(--line2);
    border-radius:var(--radius-s); padding:8px 10px;}
  textarea{width:100%; resize:vertical; min-height:56px;}
  button{cursor:pointer; border:1px solid var(--line2); background:var(--card); color:var(--ink);
    border-radius:var(--radius-s); padding:8px 13px; transition:.12s; font-weight:600;}
  button:hover{background:var(--soft);}
  button.primary{background:var(--accent); color:#fff; border-color:var(--accent);}
  button.primary:hover{filter:brightness(1.06);}
  button.big{font-size:15px; padding:12px 18px;}
  button.ghost{background:transparent;}
  button.mini{font-size:11.5px; padding:5px 9px; font-weight:600;}
  .card{background:var(--card); border:1px solid var(--line); border-radius:var(--radius);
    padding:16px 16px; box-shadow:0 1px 3px rgba(0,0,0,.04); margin-bottom:14px;}
  .card h2{font-size:15px; margin:0 0 10px; display:flex; align-items:center; gap:7px;}
  .card h2 .lock{font-size:12px;}
  .muted{color:var(--ink3); font-size:12px;}
  .row{display:flex; gap:8px; flex-wrap:wrap; align-items:center;}
  .badge{font-size:11px; border-radius:6px; padding:2px 8px; white-space:nowrap; display:inline-block;}
  .b-core{background:var(--info-bg); color:var(--info-fg);}
  .b-lead{background:var(--hot-bg); color:var(--hot-fg);}
  .b-ok{background:var(--ok-bg); color:var(--ok-fg);}
  .b-lo{background:var(--lo-bg); color:var(--lo-fg);}
  .lock{color:var(--ink3);}
  .field{margin-bottom:10px;}
  .field label{display:block; font-size:12px; color:var(--ink2); margin-bottom:4px; font-weight:600;}
  .divider{height:1px; background:var(--line); margin:12px 0;}
  .song{border:1px solid var(--line2); border-radius:var(--radius-s); padding:12px; margin-bottom:10px; background:var(--card);}
  .song.current{border:2px solid var(--accent); background:var(--hot-bg);}
  .song.break{border-style:dashed; background:var(--soft); text-align:center; color:var(--ink2);}
  .song .ttl{font-size:14.5px; font-weight:700; margin:0 0 6px;}
  .slot{display:flex; align-items:center; gap:8px; font-size:12.5px; margin:3px 0; flex-wrap:wrap;}
  .slot .pn{width:88px; color:var(--ink2); font-weight:600;}
  .slot .who{font-weight:700;}
  .slot .who.empty{color:var(--ink3); font-weight:500;}
  .plays{font-size:10.5px; color:var(--ink3);}
  .notice{background:var(--accent); color:#fff; border-radius:var(--radius); padding:14px 16px;
    font-size:15px; font-weight:700; margin-bottom:14px; box-shadow:0 2px 8px rgba(232,89,12,.3);}
  .notice small{display:block; font-weight:500; opacity:.9; font-size:12px; margin-top:2px;}
  .plist{display:flex; flex-direction:column; gap:5px;}
  .prow{display:flex; align-items:center; gap:8px; font-size:12.5px; padding:6px 8px; background:var(--soft); border-radius:6px;}
  .prow .nm{font-weight:700;}
  .prow .spacer{flex:1;}
  .landing{max-width:460px; margin:8vh auto 0; text-align:center;}
  .landing h1{justify-content:center; font-size:26px;}
  .landing .card{padding:22px;}
  .bigbtns{display:flex; flex-direction:column; gap:12px; margin-top:8px;}
  .qrbox{text-align:center;}
  .qrbox img{width:170px; height:170px; border-radius:12px; background:#fff; padding:8px; border:1px solid var(--line);}
  .toggle{display:inline-flex; align-items:center; gap:6px; font-size:12.5px; margin:4px 12px 4px 0; cursor:pointer;}
  .hint{font-size:11.5px; color:var(--ink3); margin-top:3px;}
  .flash{position:fixed; left:50%; bottom:24px; transform:translateX(-50%); background:var(--ink); color:var(--bg);
    padding:10px 18px; border-radius:99px; font-size:13px; font-weight:600; opacity:0; transition:.25s; pointer-events:none; z-index:50;}
  .flash.on{opacity:.95;}
  /* 譜面ビューア：DL/複製させない・できるだけ大きく */
  .scorev{position:fixed; inset:0; background:#0b0c0e; z-index:100; display:flex; flex-direction:column;}
  .scorev .bar{display:flex; align-items:center; gap:10px; padding:8px 12px; color:#cfd3d9; font-size:12.5px;}
  .scorev .pages{flex:1; display:flex; gap:6px; padding:0 6px 8px; align-items:stretch; justify-content:center; overflow:hidden;}
  .scorev img{flex:1; min-width:0; object-fit:contain; background:#fff; border-radius:6px;
    -webkit-user-drag:none; user-select:none; -webkit-touch-callout:none; pointer-events:none;}
  .scorev .dots{text-align:center; color:#8a909a; font-size:12px; padding-bottom:8px;}
  @media (max-width:560px){ .wrap{padding:16px 12px 72px;} .slot .pn{width:74px;} }
</style>
</head>

<div id="app" class="wrap"></div>

function load(){
  try{ const s = JSON.parse(localStorage.getItem(KEY)); if(s && s.participants){
    if(!Array.isArray(s.standards)) s.standards = DEFAULT_STANDARDS.slice(); // 旧データ移行
    if(!Array.isArray(s.notifications)) s.notifications = [];
    s.participants.forEach(p=>{ if(!Array.isArray(p.parts)) p.parts = p.part?[p.part]:[]; }); // 旧データ移行: 単一part→parts配列
    s.config = Object.assign({ songApproval:'manual', joinApproval:'manual', autoTiming:1,
      required: DEFAULT_REQUIRED.slice(), gkEither:false, endTime:null }, s.config);
    return s;
  } }catch(e){}
  const s = seed(); localStorage.setItem(KEY, JSON.stringify(s)); return s;
}

/* ---------- 2.5 リアルタイム同期（フェーズB-lite / Supabase） ----------
   接続設定が無ければ完全に今まで通り（この端末内のみ＝キッチンカー営業前の仕込みモード）。
   設定があれば jam_rooms テーブルの1行に state を丸ごと保存し、Realtimeで全端末が購読する。
   方式は「新しい方が勝つ」(last-write-wins)。行単位の正規設計はフェーズB本番で。 */
const SYNC_KEY = 'jam_sync';
let sb = null, syncStatus = 'off'; // off | connecting | on | error
function syncCfg(){ try{ const c=JSON.parse(localStorage.getItem(SYNC_KEY)); return (c&&c.url&&c.key)?c:null; }catch(e){ return null; } }
async function syncInit(){
  const cfg = syncCfg(); if(!cfg) return;
  syncStatus='connecting'; render();
  try{
    const mod = await import('https://esm.sh/@supabase/supabase-js@2');
    sb = mod.createClient(cfg.url, cfg.key);
    const room = cfg.room || 'default';
    const { data, error } = await sb.from('jam_rooms').select('state').eq('room', room).maybeSingle();
    if(error) throw error;
    if(data && data.state && (data.state.updated||0) > (state.updated||0)){
      state = data.state; localStorage.setItem(KEY, JSON.stringify(state));
    } else { await pushState(); }
    sb.channel('jam-'+room)
      .on('postgres_changes', {event:'*', schema:'public', table:'jam_rooms', filter:'room=eq.'+room}, payload=>{
        const st = payload.new && payload.new.state;
        if(st && (st.updated||0) > (state.updated||0)){
          state = st; localStorage.setItem(KEY, JSON.stringify(state)); render();
        }
      })
      .subscribe(s=>{ if(s==='SUBSCRIBED'){ syncStatus='on'; render(); } });
  }catch(e){ console.warn('sync error:', e); sb=null; syncStatus='error'; render(); }
}
let pushT=null;
function pushState(){
  if(!sb) return Promise.resolve();
  const cfg = syncCfg(); if(!cfg) return Promise.resolve();
  return sb.from('jam_rooms')
    .upsert({ room: cfg.room||'default', state: state, updated_at: new Date().toISOString() })
    .then(r=>{ if(r.error) console.warn('push error:', r.error); });
}
function schedulePush(){ if(!sb) return; clearTimeout(pushT); pushT=setTimeout(pushState, 400); }
function syncConnect(){
  const url=(document.getElementById('sy-url').value||'').trim();
  const key=(document.getElementById('sy-key').value||'').trim();
  const room=(document.getElementById('sy-room').value||'').trim()||'default';
  if(!url||!key) return;
  localStorage.setItem(SYNC_KEY, JSON.stringify({url,key,room}));
  syncInit();
}
function syncOff(){
  localStorage.removeItem(SYNC_KEY);
  if(sb && sb.removeAllChannels) sb.removeAllChannels();
  sb=null; syncStatus='off'; render();
}
// QRのURLに ?sy=接続情報 が付いていたら取り込む（参加者はスキャンするだけで同じ部屋に入れる）

/* ---------- 3. 公平エンジン ---------- */
function getP(id){ return state.participants.find(p=>p.id===id); }
function remainMin(p){
  // until("HH:MM") と現在時刻から残り分。プロトなので現在時刻はブラウザ時計。
  if(!p.until) return 9999;
  const [h,m] = p.until.split(':').map(Number);
  const d = new Date(); const end = new Date(); end.setHours(h,m,0,0);
  let diff = (end - d)/60000; if(diff < -60) diff += 1440; // 日跨ぎ保険
  return Math.max(0, Math.round(diff));
}
function effScore(p){
  // 主軸=出演回数。評価補正ONなら いいね で実効スコアを下げる（＝優先されやすく）
  return p.plays - (state.config.boost * (p.likes||0));
}
// スロット＝編成の1枠。同じパートが複数重なってもよく、2枠目以降は 'guitar#2' のように枝番で区別
function slotPart(slot){ return String(slot).split('#')[0]; }
function fairCompare(a,b){
  const sa = effScore(a), sb = effScore(b);
  if(sa !== sb) return sa - sb;                 // 出演の少ない順
  const tb = state.config.tiebreak;
  if(tb === 'soon') return remainMin(a) - remainMin(b);   // 残り少ない順
  if(tb === 'long') return remainMin(b) - remainMin(a);   // 残り多い順
  return a.arrived - b.arrived;                 // 使わない=到着順
}
function suggestMap(song){
  // 曲の全スロットの提案を一括計算。手動指名・確定済みを先に確保し、同じ人が2枠に入らないよう除外していく
  const map={}; const taken=new Set();
  (song.lineup||[]).forEach(sl=>{
    const fixed = song.manual[sl] || (song.confirmed && song.members && song.members[sl]) || null;
    if(fixed){ map[sl]=fixed; taken.add(fixed); }
  });
  (song.lineup||[]).forEach(sl=>{
    if(map[sl]) return;
    const cand=(song.apply[slotPart(sl)]||[]).map(getP).filter(Boolean).filter(p=>!taken.has(p.id));
    if(!cand.length) return;
    cand.sort(fairCompare);
    map[sl]=cand[0].id; taken.add(cand[0].id);
  });
  return map;
}
function suggestFor(song, slot){
  if(song.manual[slot]) return { id: song.manual[slot], manual:true };
  const id = suggestMap(song)[slot];
  return id ? { id, manual:false } : null;
}

let viewerSid=null, viewerPage=0, tX=null;
function compressImage(file){
  // 端末写真をそのまま入れると重いので、canvasで縮小＋JPEG圧縮（帳簿=stateに入る前提のダイエット）
  return new Promise(res=>{
    const img=new Image();
    img.onload=()=>{
      const MAX=1500, sc=Math.min(1, MAX/Math.max(img.width,img.height));
      const cv=document.createElement('canvas');
      cv.width=Math.round(img.width*sc); cv.height=Math.round(img.height*sc);
      cv.getContext('2d').drawImage(img,0,0,cv.width,cv.height);
      URL.revokeObjectURL(img.src);
      res(cv.toDataURL('image/jpeg',0.72));
    };
    img.src=URL.createObjectURL(file);
  });
}

let pdfReady = null;
function loadPdfJs(){
  // pdf.js(安定版v3・従来型)を必要なときだけ読み込む。ワーカーは取り寄せてblobから起動
  // （別スレッドで解析させるのが肝＝壊れたPDFでも画面が凍らず、タイムアウトで切れる）
  if(pdfReady) return pdfReady;
  pdfReady = new Promise((res, rej)=>{
    const sc=document.createElement('script');
    sc.src='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js';
    sc.onload=async()=>{
      try{
        const src = await fetch('https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js').then(r=>r.text());
        window.pdfjsLib.GlobalWorkerOptions.workerSrc = URL.createObjectURL(new Blob([src], {type:'text/javascript'}));
        res(window.pdfjsLib);
      }catch(e){ pdfReady=null; rej(e); }
    };
    sc.onerror=()=>{ pdfReady=null; rej(new Error('pdf.js load failed')); };
    document.head.appendChild(sc);
  });
  return pdfReady;
}
async function pdfToImages(file, maxPages){
  const withTimeout = (p,ms)=>Promise.race([p, new Promise((_,rej)=>setTimeout(()=>rej(new Error('pdf timeout')),ms))]);
  const pdfjs = await withTimeout(loadPdfJs(), 15000);
  const buf = await file.arrayBuffer();
  const doc = await withTimeout(pdfjs.getDocument({ data: buf }).promise, 20000);
  const out = [];
  const n = Math.min(doc.numPages, maxPages);
  for(let i=1; i<=n; i++){
    const page = await doc.getPage(i);
    const vp0 = page.getViewport({scale:1});
    const scale = 1500/Math.max(vp0.width, vp0.height);
    const vp = page.getViewport({scale});
    const cv=document.createElement('canvas'); cv.width=Math.round(vp.width); cv.height=Math.round(vp.height);
    await page.render({ canvasContext: cv.getContext('2d'), viewport: vp }).promise;
    out.push(cv.toDataURL('image/jpeg',0.72));
  }
  return out;
}
async function onScoreFiles(sid, input){
  const s=state.songs.find(x=>x.id===sid); if(!s||!input.files.length) return;
  const files=[...input.files];
  const pages=[];
  try{
    for(const f of files){
      if(pages.length>=3) break;  // 1曲最大3ページ
      if(f.type==='application/pdf' || /\.pdf$/i.test(f.name)){
        pages.push(...await pdfToImages(f, 3-pages.length));
      }else{
        pages.push(await compressImage(f));
      }
    }
  }catch(e){ console.warn('score convert error:', e); }
  input.value='';
  if(!pages.length) return;
  const me=getP(myId());
  s.score={ pages: pages.slice(0,3), up: me?me.name:'' };
  save(); flash('🎼');
}
function openScore(sid){ viewerSid=sid; viewerPage=0; keepAwake(); render(); }
function viewerOverlay(){
  if(!viewerSid) return '';
  const s=state.songs.find(x=>x.id===viewerSid);
  if(!s||!s.score||!s.score.pages.length){ viewerSid=null; return ''; } // 演奏終了で自動削除→開いていた画面も閉じる
  return scoreViewerHtml(s, false);
}
function closeScore(){ viewerSid=null; render(); }
function rmScore(sid){ const s=state.songs.find(x=>x.id===sid); if(s){ delete s.score; save(); } }
function svTS(e){ tX=e.touches[0].clientX; }
function svTE(e){ if(tX==null) return; const dx=e.changedTouches[0].clientX-tX; tX=null; if(Math.abs(dx)>40) svNav(dx<0?1:-1); }
function svNav(dir){
  const s=state.songs.find(x=>x.id===viewerSid); if(!s||!s.score) return;
  const per = (window.innerWidth>window.innerHeight)?2:1;
  const max = Math.max(0, s.score.pages.length-per);
  viewerPage = Math.min(max, Math.max(0, viewerPage + dir*per));
  render();
}
function scoreViewerHtml(s, fullscreen){
  // 2ページまで＝全部を一度に最大表示。3ページ以上＝スワイプ（横置き2枚ずつ/縦置き1枚ずつ）
  const pgs=s.score.pages;
  const landscape = window.innerWidth>window.innerHeight;
  let shown, dots='';
  if(pgs.length<=2){
    shown=pgs;
  }else{
    const per=landscape?2:1;
    shown=pgs.slice(viewerPage, viewerPage+per);
    dots=`<div class="dots">${Array.from({length:Math.ceil(pgs.length/(landscape?2:1))},(_,i)=>(i===Math.floor(viewerPage/(landscape?2:1))?'●':'○')).join(' ')}　←→</div>`;
  }
  return `<div class="scorev" oncontextmenu="return false" ontouchstart="svTS(event)" ontouchend="svTE(event)">
    <div class="bar"><b>🎼 ${esc(s.title)}</b><span class="spacer"></span>
      <span>${t('scoreAutoDel')}</span>
      ${fullscreen?'':`<button class="mini" onclick="closeScore()">${t('close')}</button>`}</div>
    <div class="pages">${shown.map(p=>`<img src="${p}" draggable="false">`).join('')}</div>
    ${dots}
  </div>`;
}

/* ---- 画面スリープ無効化（Wake Lock）。モニター表示中は画面が勝手に消えないようにする。
   ※https（またはlocalhost）でのみ有効。譜面表示（フェーズD）でもデフォルトONで使う予定 ---- */
let wakeLock = null;
async function keepAwake(){
  if(!('wakeLock' in navigator)) return;
  try{
    wakeLock = await navigator.wakeLock.request('screen');
    wakeLock.addEventListener('release', ()=>{ wakeLock=null; });
  }catch(e){ /* 非https・省電力設定では取得できないことがある（アプリは通常動作） */ }
}
document.addEventListener('visibilitychange', ()=>{
  const r = role();
  if(document.visibilityState==='visible' && (r==='watch'||r==='stand'||viewerSid) && !wakeLock) keepAwake();
});

function songCardHost(s, isCurrent){
  if(s.isBreak) return `<div class="song break">${breakLabel(s)}${!isCurrent?` <button class="mini ghost" onclick="rmSong('${s.id}')">✕</button>`:''}</div>`;
  // 同じパートが複数枠あるときは「ギター1／ギター2」のように枝番で表示
  const partCounts = {}; s.lineup.forEach(sl=>{ const p=slotPart(sl); partCounts[p]=(partCounts[p]||0)+1; });
  const seenIdx = {};
  const slots = s.lineup.map(slot=>{
    const part = slotPart(slot);
    seenIdx[part]=(seenIdx[part]||0)+1;
    const cls = state.config.required.includes(part)?'b-core':'b-lead';
    const sug = suggestFor(s, slot);
    const p = sug ? getP(sug.id) : null;
    const base = pLabel(p, part);   // 「その他」枠は入っている人の自由記入楽器名で表示
    const label = partCounts[part]>1 ? base+seenIdx[part] : base;
    const who = p ? `<span class="who">${esc(p.name)}</span> <span class="plays">(${t('plays')}${p.plays}${sug.manual?' ✋':''})</span>`
                  : `<span class="who empty">— ${t('notApplied')}</span>`;
    const swapBtn = (s.apply[part]||[]).length>1 ? `<button class="mini ghost" onclick="cycleSwap('${s.id}','${slot}')">${t('swap')}</button>` : '';
    const rmBtn = slot.includes('#') ? `<button class="mini ghost" onclick="rmSlot('${s.id}','${slot}')">✕</button>` : '';
    return `<div class="slot"><span class="pn"><span class="badge ${cls}">${label}</span></span>${who}<span class="spacer"></span>${swapBtn}${rmBtn}</div>`;
  }).join('');
  const vip = s.vip.map((v,i)=>`<div class="slot"><span class="pn">${partName(v.part)}</span><span class="who">👑 ${esc(v.name)}</span><span class="plays">(VIP)</span><span class="spacer"></span><button class="mini ghost" onclick="rmVip('${s.id}',${i})">✕</button></div>`).join('');
  const vipForm = vipFormSid===s.id ? `<div class="row" style="margin-top:8px">
      <input type="text" id="vipn-${s.id}" placeholder="${t('yourName')}" style="flex:1;min-width:110px">
      <select id="vipp-${s.id}">${ALL_PARTS.map(p=>`<option value="${p}">${partName(p)}</option>`).join('')}</select>
      <button class="mini primary" onclick="addVip('${s.id}')">＋${t('add')}</button>
      <button class="mini ghost" onclick="vipInsert('${s.id}')">${t('cancel')}</button>
    </div>` : '';
  // 必須パートの未充足：警告＋募集呼びかけ＋運営の独断アサイン
  const miss = unfilledParts(s);
  const missHtml = miss.length ? `<div class="row" style="margin-top:6px">
      <span class="badge" style="background:var(--warn-bg);color:var(--warn-fg)">⚠ ${t('unfilled')}: ${miss.map(partName).join(' / ')}</span>
      <button class="mini" onclick="callFor('${s.id}')">${t('callFor')}</button></div>` +
    miss.map(p=>`<div class="slot"><span class="pn">${badgePart(p)}</span>
      <select id="asg-${s.id}-${p}">${state.participants.map(pp=>`<option value="${pp.id}">${esc(pp.name)} (${pp.parts.map(pt=>pLabel(pp,pt)).join('/')})</option>`).join('')}</select>
      <button class="mini" onclick="assignPart('${s.id}','${p}')">${t('assign')}</button></div>`).join('') : '';
  return `<div class="song ${isCurrent?'current':''}">
    <div class="ttl">${isCurrent?'▶ ':''}${esc(s.title)} ${s.confirmed?`<span class="badge b-ok">${t('confirmed')}</span> <button class="mini ghost" onclick="unconfirmSong('${s.id}')">${t('unconfirm')}</button>`:''}</div>
    <div class="muted" style="margin-bottom:6px">${t('requestedBy')}: ${esc(s.requestedBy)}</div>
    ${slots}${vip}${vipForm}${missHtml}
    <div class="row" style="margin-top:8px">
      <select id="slotp-${s.id}">${ALL_PARTS.map(p=>`<option value="${p}">${partName(p)}</option>`).join('')}</select>
      <button class="mini" onclick="addSlot('${s.id}')">＋${t('addPart')}</button>
      <button class="mini" onclick="vipInsert('${s.id}')">👑 ${t('vipInsert')}</button>
      ${s.score&&s.score.pages.length?`<button class="mini" onclick="openScore('${s.id}')">🎼</button>
        <button class="mini ghost" onclick="rmScore('${s.id}')">🎼✕</button>`:''}
      ${isCurrent?`<button class="mini primary" onclick="confirmSong('${s.id}')">${t('confirm')}</button>
        <button class="mini" onclick="prep('${s.id}','next')">${t('prepNext')}</button>`:''}
      ${!isCurrent?`<button class="mini" onclick="prep('${s.id}','nextnext')">${t('prepNextNext')}</button>
        <button class="mini ghost" onclick="rmSong('${s.id}')">✕</button>`:''}
    </div>
  </div>`;
}
function badgePart(part){
  // 必須パート=青、それ以外=オレンジ（リード概念は廃止・色は必須/任意の区別）
  const cls = state.config.required.includes(part)?'b-core':'b-lead';
  return `<span class="badge ${cls}">${partName(part)}</span>`;

function pLabel(p, pt){
  // 「その他」の人は自由記入した楽器名で表示する
  return (pt==='other' && p && p.otherName) ? esc(p.otherName) : partName(pt);

function performersOf(song){
  const ids = [];
  song.lineup.forEach(part=>{ const s = suggestFor(song, part); if(s) ids.push(s.id); });
  return ids;
}

/* ---------- 5. アクション ---------- */
function cfg(k,v){ state.config[k]=v; save(); }
function flash(msg){ const f=document.getElementById('flash'); f.textContent=msg; f.classList.add('on'); setTimeout(()=>f.classList.remove('on'),1600); }

function doJoin(){
  const name=(document.getElementById('jn').value||'').trim(); if(!name) return;
  // 複数パート選択OK（チェックボックス）。最低1つ必要
  const parts=[...document.querySelectorAll('.jp-part:checked')].map(el=>el.value);
  const otherName=(document.getElementById('jo')?.value||'').trim(); // 「その他」の楽器名（自由記入）
  if(!parts.length) return;
  const stayToEnd = !!(document.getElementById('jstay')||{}).checked;
  let until = stayToEnd ? (state.config.endTime||null) : document.getElementById('ju').value;
  // セッション終了時刻を超える申告は終了時刻に丸める
  if(until && state.config.endTime && until > state.config.endTime) until = state.config.endTime;
  const p={ id:uid(), name, parts, plays:0,
    arrived:now(), until, stayToEnd, likes:0, bads:0 };
  if(parts.includes('other') && otherName) p.otherName = otherName;
  state.participants.push(p); setMe(p.id); save();
}
function addSongTitle(title){
  title=(title||'').trim(); if(!title) return;
  const me=getP(myId());
  const needsApproval = state.config.songApproval==='manual'; // デフォルト=運営の承認が必要
  state.songs.push({ id:uid(), title, requestedBy: me?me.name:'?', requesterId: me?me.id:null,
    lineup:[...state.config.required], apply:{}, manual:{}, vip:[],
    status: needsApproval?'pending':'queued', confirmed:false });
  save(); flash((needsApproval?'⏳ ':'＋ ')+title);
}
function addSongJoin(){ const el=document.getElementById('newsong'); addSongTitle(el.value); el.value=''; }
function addStandard(){
  const el=document.getElementById('newstd'); const v=(el.value||'').trim(); if(!v) return;
  if(!state.standards.includes(v)) state.standards.push(v); el.value=''; save();
}
function rmStandard(i){ state.standards.splice(i,1); save(); }
function applySong(sid, part){
  const s=state.songs.find(x=>x.id===sid); const me=getP(myId()); if(!s||!me) return;
  part = part || me.parts[0]; if(!me.parts.includes(part)) return; // 自分の担当パートでだけ挙手できる
  s.apply[part] = s.apply[part]||[]; if(!s.apply[part].includes(me.id)) s.apply[part].push(me.id);
  if(!s.lineup.some(sl=>slotPart(sl)===part)) s.lineup.push(part); // どのパートも同格に参加できる（枠が無ければ作る）
  notify(involvedIds(s).filter(id=>id!==me.id), 'nApply', {who:me.name, partKey:part, song:s.title});
  save();
}
function unapplySong(sid, part){
  // 確定までは挙手を取り下げられる。確定後はロック（運営に相談）
  const s=state.songs.find(x=>x.id===sid); const me=getP(myId()); if(!s||!me||s.confirmed) return;
  const a=s.apply[part]||[]; const i=a.indexOf(me.id); if(i<0) return;
  a.splice(i,1);
  Object.keys(s.manual).forEach(sl=>{ if(s.manual[sl]===me.id && slotPart(sl)===part) delete s.manual[sl]; });
  save(); flash('✕');
}
function unconfirmSong(sid){
  // 運営はいつでも確定を解除して組み直せる（自動提案が生き返る）
  const s=state.songs.find(x=>x.id===sid); if(!s) return;
  s.confirmed=false; s.members={};
  save(); flash('🔓');
}

/* ---- 通知（自分の関わる曲の出来事だけ届く。表示は見る人の言語で翻訳） ---- */
function tt(key, vars){
  let s = t(key);
  const v = Object.assign({}, vars);
  if(v.partKey) v.part = partName(v.partKey);           // パート名は閲覧者の言語で
  if(v.partKeys) v.parts = v.partKeys.map(partName).join(' / ');
  Object.keys(v).forEach(k=>{ s = s.split('{'+k+'}').join(esc(v[k])); });
  return s;
}
function notify(targets, key, vars){
  state.notifications.push({ id:uid(), ts:now(), targets, key, vars });
  if(state.notifications.length>30) state.notifications = state.notifications.slice(-30);
}
function involvedIds(s){
  const ids = [].concat(...Object.values(s.apply||{}));
  if(s.requesterId) ids.push(s.requesterId);
  if(s.members) ids.push(...Object.values(s.members));
  return [...new Set(ids)];
}

/* ---- 曲リクエストの承認（運営） ---- */
function approveSong(sid){
  const s=state.songs.find(x=>x.id===sid); if(!s||s.status!=='pending') return;
  s.status='queued';
  notify(s.requesterId?[s.requesterId]:[], 'nSongOk', {song:s.title});
  save(); flash('✔ '+s.title);
}
function rejectSong(sid){
  const i=state.songs.findIndex(x=>x.id===sid); if(i<0||state.songs[i].status!=='pending') return;
  const s=state.songs[i];
  notify(s.requesterId?[s.requesterId]:[], 'nSongNg', {song:s.title});
  state.songs.splice(i,1); save();
}

/* ---- 必須パートの充足チェック・独断アサイン・募集呼びかけ ---- */
function unfilledParts(s){
  if(s.isBreak) return [];
  const req = state.config.required;
  const has = p => s.lineup.some(sl=>slotPart(sl)===p && suggestFor(s,sl));
  let miss = req.filter(p=>!has(p));
  if(state.config.gkEither && req.includes('guitar') && req.includes('keys') && (has('guitar')||has('keys')))
    miss = miss.filter(p=>p!=='guitar' && p!=='keys');
  return miss;
}
function assignPart(sid, part){
  const s=state.songs.find(x=>x.id===sid); const sel=document.getElementById('asg-'+sid+'-'+part);
  if(!s||!sel||!sel.value) return;
  s.manual[part]=sel.value;                       // 運営の独断＝手動指名として最優先
  if(!s.lineup.includes(part)) s.lineup.push(part);
  if(s.confirmed && s.members) s.members[part]=sel.value;
  save();
}
function callFor(sid){
  const s=state.songs.find(x=>x.id===sid); if(!s) return;
  const miss=unfilledParts(s); if(!miss.length) return;
  notify('all','nCall',{song:s.title, partKeys:miss});
  save(); flash('📢');
}
function reqToggle(p){
  const r=state.config.required; const i=r.indexOf(p);
  if(i>=0) r.splice(i,1); else r.push(p);
  save();
}
function cycleSwap(sid, slot){
  const s=state.songs.find(x=>x.id===sid); const ids=s.apply[slotPart(slot)]||[]; if(ids.length<2) return;
  const curId = suggestFor(s,slot)?.id; const idx = ids.indexOf(curId);
  s.manual[slot] = ids[(idx+1)%ids.length];
  if(s.confirmed && s.members) s.members[slot]=s.manual[slot]; // 確定後の差し替えもスナップショットに反映
  save();
}
function addSlot(sid){
  // 同じパートをもう1枠増やす（Gt1/Gt2のように枝番で区別）
  const s=state.songs.find(x=>x.id===sid); const sel=document.getElementById('slotp-'+sid);
  if(!s||!sel||!sel.value) return;
  const part=sel.value;
  const n = s.lineup.filter(sl=>slotPart(sl)===part).length;
  s.lineup.push(n===0 ? part : part+'#'+(n+1));
  save();
}
function rmSlot(sid, slot){
  const s=state.songs.find(x=>x.id===sid); if(!s) return;
  const i=s.lineup.indexOf(slot); if(i<0) return;
  s.lineup.splice(i,1); delete s.manual[slot]; if(s.members) delete s.members[slot];
  save();
}
function setPreset(mode){
  // 運営スタイルのワンタップ切替：auto=見てるだけで進む／manual=全部運営が承認
  state.config.songApproval = mode; state.config.joinApproval = mode;
  save(); flash(mode==='auto'?t('presetAuto'):t('presetManual'));
}
let vipFormSid = null; // VIP入力フォームを開いている曲（画面ローカル・保存しない）
function vipInsert(sid){ vipFormSid = (vipFormSid===sid ? null : sid); render(); }
function addVip(sid){
  const s=state.songs.find(x=>x.id===sid); if(!s) return;
  const name=(document.getElementById('vipn-'+sid).value||'').trim(); if(!name) return;
  const part=document.getElementById('vipp-'+sid).value||'other';
  s.vip.push({ name, part }); vipFormSid=null; save(); flash('👑 '+name);
}
function rmVip(sid, i){
  const s=state.songs.find(x=>x.id===sid); if(!s) return;
  s.vip.splice(i,1); save();
}
function snapshotMembers(s){
  // いま提案されている顔ぶれ（手動・既存の確定・枝番スロット含む）を写真に撮って固定する
  s.members = suggestMap(s);
}
function confirmSong(sid){
  const s=state.songs.find(x=>x.id===sid); if(!s) return;
  snapshotMembers(s); s.confirmed=true; save(); flash(t('confirmed'));
}
function nextSong(){
  const cur=state.songs.find(s=>s.status==='current');
  if(cur && !cur.isBreak){
    // 未確定でもここで確定＝実際に演奏した人に確実に出演+1が付く
    snapshotMembers(cur); cur.confirmed=true;
    const perf = Object.values(cur.members);
    perf.forEach(id=>{ const p=getP(id); if(p) p.plays++; });
    cur.status='done';
    delete cur.score; // 譜面は演奏終了でその場限りの自動削除（権利配慮の肝）
    // 曲終わりの評価催促（運営オプション）：終わった曲の実メンバーへの評価を全員に促す
    state.evalAsk = (state.config.evalOn && state.config.promptEval && perf.length)
      ? { sid:cur.id, title:cur.title, ids:perf.slice(), ts:now() } : null;
  }
  else if(cur){ cur.status='done'; state.evalAsk=null; }
  const nxt=state.songs.find(s=>s.status==='queued');
  if(nxt){
    nxt.status='current';
    // ステージに上がった瞬間に顔ぶれを確定＝演奏中に評価が入っても提案がすり替わらない
    if(!nxt.isBreak){ snapshotMembers(nxt); nxt.confirmed=true; }
  }
  // メンバー自動確定モード：設定した「N曲前」に来た曲を、その時点の希望状況で確定して通知
  if(state.config.joinApproval==='auto'){
    const q = state.songs.filter(s=>s.status==='queued' && !s.isBreak);
    const tgt = q[state.config.autoTiming-1];
    if(tgt && !tgt.confirmed){
      snapshotMembers(tgt); tgt.confirmed=true;
      notify(involvedIds(tgt),'nLocked',{song:tgt.title});
    }
  }
  state.prep=null; save(); flash(t('nextSong'));
}
function rmSong(sid){
  const i=state.songs.findIndex(x=>x.id===sid);
  if(i>=0 && state.songs[i].status==='queued'){ state.songs.splice(i,1); save(); }
}
function addBreak(){
  // 再開予定時刻は任意（空欄OK）。決めると休憩カードに「⏰HH:MM 再開予定」と出る
  const el=document.getElementById('breaktime');
  const resumeAt=(el&&el.value)||null;
  state.songs.push({ id:uid(), title:'break', isBreak:true, resumeAt, lineup:[], apply:{}, manual:{}, vip:[], status:'queued', confirmed:false });
  if(el) el.value='';
  save();
}
function breakLabel(s){
  return t('breakTime') + (s.resumeAt ? ` ⏰ ${s.resumeAt} ${t('resumeAt')}` : '');
}
function prep(sid, type){
  const s=state.songs.find(x=>x.id===sid);
  state.prep={ type, ids: performersOf(s), song:s.title, ts:now() };
  save(); flash('🔔 ' + (type==='next'?t('prepNext'):t('prepNextNext')));
}
function rate(pid, kind){
  const p=getP(pid); if(!p) return;
  if(kind==='like') p.likes=(p.likes||0)+1; else p.bads=(p.bads||0)+1;
  save(); flash(kind==='like'?'👍':'👎');
}
function addComment(sid){
  const el=document.getElementById('cmt-'+sid); if(!el) return; const text=(el.value||'').trim(); if(!text) return;
  const me=getP(myId());
  state.comments.push({ sid, text, name: state.config.named&&me?me.name:'', ts:now() });
  el.value=''; save(); flash(t('send'));
}
function sendFeedback(){
  const el=document.getElementById('fb'); const text=(el.value||'').trim(); if(!text) return;
  state.feedback.push({ text, ts:now() }); el.value=''; save(); flash(t('send'));
}

    <body style="font-family:sans-serif;text-align:center;padding:30px">
      <h1 style="font-size:26px">🎸 Jam Session</h1>
      <img src="https://api.qrserver.com/v1/create-qr-code/?size=260x260&data=${encodeURIComponent(joinUrl)}"
        style="width:260px;height:260px;margin:10px">

      <div style="margin-top:20px;color:#999;font-size:12px">${esc(joinUrl)}</div>
      <script>setTimeout(()=>window.print(),400)<\/script>

  w.document.close();
}

window.addEventListener('storage', (e)=>{ if(e.key===KEY){ try{ state=JSON.parse(e.newValue);}catch(_){} render(); } });
render();
syncInit(); // 接続設定があればSupabase同期を開始（無ければ何もしない）
if(role()==='watch'||role()==='stand') keepAwake(); // モニター/譜面台表示中は画面が勝手に消えないように
